<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calendar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #2b472b;
        }

        /* MONTH LIST */
        .month-container {
            margin: 50px auto;
            width: 100%;
            background-color:#2b472b;
            border-radius: 20px;
            padding: 5px;
        }

        .month-container table {
            width: 100%;
            border-collapse: collapse;
        }

        .month-container td {
            border: 5px solid #2b472b;
            padding: 10px;
            text-align: center;
            background-color: #f5f0e7;
            border-radius: 20px;
            
        }

        .month-container a {
            text-decoration: none;
            color: #5c4033;
            display: block;
            border-radius: 20px;
        }

        .month-container a:hover {
            background-color: #f5f0e7;
        }

        /* MAIN CALENDAR */
        .calendar-container {
            margin: 60px 500px;
            background-color: #2b472b;
            border-radius: 10px;
            padding: 20px;
        }

        .calendar-container table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            border: 5px solid #f5f0e7;
            padding: 10px;
            .custom-bold 
                    font-weight: 700; /* 700 is bold */
            text-align: center;
            border-radius: 20px;
        }

        th, td {
            border: 5px solid #f5f0e7;
            padding: 10px;
            .custom-bold 
                    font-weight: 700; /* 700 is bold */
            text-align: center;
            border-radius: 20px;
        }

        th {
            background-color: #cfcdc8;
            color: #2b472b;
        }

        td {
            background-color: #f5f0e7;
        }

        h2 {
             border: 5px solid #f5f0e7;
            padding: 10px;
            .custom-bold 
                    font-weight: 700; /* 700 is bold */
            text-align: center;
            border-radius: 20px;
        }
    </style>
</head>
